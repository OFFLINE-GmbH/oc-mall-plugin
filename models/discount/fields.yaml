fields:
    name:
        label: 'offline.mall::lang.discounts.name'
        oc.commentPosition: ''
        span: auto
        type: text
    valid_from:
        label: 'offline.mall::lang.discounts.valid_from'
        mode: date
        span: auto
        type: datepicker
    expires:
        label: 'offline.mall::lang.discounts.expires'
        oc.commentPosition: ''
        mode: date
        span: auto
        type: datepicker
    section_type:
        label: 'offline.mall::lang.discounts.section_type'
        span: left
        type: section
    section_trigger:
        label: 'offline.mall::lang.discounts.section_trigger'
        span: auto
        type: section
    type:
        label: 'offline.mall::lang.discounts.type'
        oc.commentPosition: ''
        span: left
        type: dropdown
    conditions_operator:
        label: 'offline.mall::lang.discounts.conditions_operator'
        comment: 'offline.mall::lang.discounts.conditions_operator_comment'
        oc.commentPosition: ''
        span: right
        type: dropdown
    _amounts:
        label: 'offline.mall::lang.discounts.amount'
        oc.commentPosition: ''
        span: left
        trigger:
            action: show
            field: type
            condition: value[fixed_amount]
        type: mall.price
    rate:
        label: 'offline.mall::lang.discounts.rate'
        oc.commentPosition: ''
        span: left
        trigger:
            action: show
            field: type
            condition: value[rate]
        type: number
    max_number_of_usages:
        label: 'offline.mall::lang.discounts.max_number_of_usages'
        oc.commentPosition: ''
        span: left
        type: text
    shipping_description:
        label: 'offline.mall::lang.discounts.shipping_description'
        oc.commentPosition: ''
        span: left
        trigger:
            action: show
            field: type
            condition: value[shipping]
        type: text
    shipping_guaranteed_days_to_delivery:
        label: 'offline.mall::lang.discounts.shipping_guaranteed_days_to_delivery'
        oc.commentPosition: ''
        span: left
        trigger:
            action: show
            field: type
            condition: value[shipping]
        type: number
    _shipping_prices:
        label: 'offline.mall::lang.discounts.shipping_price'
        oc.commentPosition: ''
        span: left
        trigger:
            action: show
            field: type
            condition: value[shipping]
        type: mall.price
    _conditions:
        label: 'offline.mall::lang.discounts.conditions'
        span: full
        type: repeater
        style: default
        valueFrom: conditionItems
        form: ~/plugins/offline/mall/models/discountcondition/fields.yaml
